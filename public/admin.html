<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <style>
    table { border-collapse: collapse; width: 50%; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; }
    th { background-color: #eee; }
    button { padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>
  <table id="slotsTable">
    <tr><th>Slot</th><th>Name</th><th>Action</th></tr>
  </table>

  <script>
    const ADMIN_PASSWORD = "Www1903121912-"; // replace with your password

    async function loadSlots() {
      try {
        const res = await fetch("/api/slots");
        const bookings = await res.json();
        const table = document.getElementById("slotsTable");

        // Clear previous rows except header
        table.querySelectorAll("tr:not(:first-child)").forEach(tr => tr.remove());

        for (const slot in bookings) {
          const row = document.createElement("tr");

          const slotCell = document.createElement("td");
          slotCell.textContent = slot;

          const nameCell = document.createElement("td");
          nameCell.textContent = bookings[slot];

          const actionCell = document.createElement("td");
          const btn = document.createElement("button");
          btn.textContent = "Cancel";
          btn.onclick = () => cancelSlot(slot);
          actionCell.appendChild(btn);

          row.appendChild(slotCell);
          row.appendChild(nameCell);
          row.appendChild(actionCell);
          table.appendChild(row);
        }
      } catch (err) {
        alert("Error loading slots: " + err.message);
      }
    }

    async function cancelSlot(slot) {
      try {
        const res = await fetch(`/api/cancel/${slot}?pw=${encodeURIComponent(ADMIN_PASSWORD)}`, {
          method: "DELETE"
        });
        const data = await res.json();
        if (res.ok) {
          alert(data.message);
          loadSlots();
        } else {
          alert("Error: " + data.message);
        }
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    window.onload = loadSlots;
  </script>
</body>
</html>
