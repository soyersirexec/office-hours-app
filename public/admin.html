<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>
  <h1>Admin - Cancel Bookings</h1>
  <div id="adminSlots"></div>

  <script>
    async function loadAdmin() {
      const res = await fetch("/api/slots");
      const bookings = await res.json();

      const container = document.getElementById("adminSlots");
      container.innerHTML = "";

      for (let slot in bookings) {
        const div = document.createElement("div");
        div.innerHTML = `
          ${slot} - ${bookings[slot]}
          <button onclick="cancelSlot('${slot}')">Cancel</button>
        `;
        container.appendChild(div);
      }
    }

    async function cancelSlot(slot) {
      await fetch("/api/cancel/" + encodeURIComponent(slot), {
        method: "DELETE"
      });
      loadAdmin();
    }

    loadAdmin();
  </script>
</body>
</html>
