<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:40px}
    .card{max-width:420px;margin:0 auto;padding:22px;border:1px solid rgba(0,0,0,.15);border-radius:12px}
    .row{display:flex;gap:10px}
    input{flex:1;padding:10px;border:1px solid rgba(0,0,0,.2);border-radius:10px}
    button{padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.35);cursor:pointer}
    .msg{margin-top:12px;color:#b00020;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 14px">Admin Login</h2>
    <form id="f">
      <div class="row">
        <input id="pw" type="password" placeholder="Admin password" autocomplete="current-password" required>
        <button type="submit" id="btn">Login</button>
      </div>
      <div class="msg" id="msg"></div>
    </form>
  </div>

<script>
const f = document.getElementById('f');
const pw = document.getElementById('pw');
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

f.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  btn.disabled = true;
  try{
    const r = await fetch('/api/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body: JSON.stringify({ password: pw.value })
    });
    const text = await r.text();
    let data = {};
    try{ data = JSON.parse(text); } catch { data = { message: text }; }
    if(!r.ok){
      msg.textContent = data.error || data.message || ('Login failed (HTTP ' + r.status + ')');
      btn.disabled = false;
      return;
    }
    window.location.href = '/admin';
  } catch(err){
    msg.textContent = 'Network error: ' + (err?.message || String(err));
    btn.disabled = false;
  }
});
</script>
</body>
</html>
