<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANKARA MEDIPOL UNIVERSITY 
    SCHOOL OF FOREIGN LANGUAGES APPOINTMENT SYSTEM
  </title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Banner -->
  <header class="bg-blue-700 text-white p-6 shadow-md">
    <h1 class="text-3xl font-bold">AMPAS Booking System</h1>
    <p class="text-sm mt-1">Book Speaking Center sessions easily with one click.</p>
  </header>

  <!-- Tabs container -->
  <div class="mt-6 max-w-4xl mx-auto px-4">
    <div class="border-b border-gray-300">
      <nav class="flex space-x-4" aria-label="Tabs">
        <button class="tab-button border-b-2 border-blue-700 text-blue-700 py-2 px-4 font-medium" data-tab="appointments">
          Appointments
        </button>
        <!-- Future tabs can be added here -->
      </nav>
    </div>

    <!-- Tab content -->
    <div id="appointments" class="tab-content mt-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <!-- Monday 2 February -->
  <div class="p-4 bg-white rounded shadow">
    <h2 class="font-semibold mb-2">Monday, 2 February</h2>
    <div class="flex flex-wrap gap-2">
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-morning">09:00 - 09:30</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-morning">10:00 - 10:30</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-morning">10:45 - 11:15</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-morning">11:15 - 11:45</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-morning">12:00 - 12:30</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-afternoon">13:15 - 13:45</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-afternoon">13:45 - 14:15</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="2feb-afternoon">14:30 - 15:00</button>
    </div>
  </div>

  <!-- Tuesday 7 March -->
  <div class="p-4 bg-white rounded shadow">
    <h2 class="font-semibold mb-2">Tuesday, 2 Fe</h2>
    <div class="flex flex-wrap gap-2">
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="7mar-morning">09:00 - 09:30</button>
      <button class="slot bg-green-500 text-white px-3 py-1 rounded" data-slot="7mar-midday">10:00 - 10:30</button>
    </div>
  </div>
</div>
    </div>
  </div>

  <!-- Footer / Creator credit -->
  <footer class="mt-12 text-center text-xs text-gray-500">
    Created by Serdar Soyer
  </footer>

</body>
</html>
