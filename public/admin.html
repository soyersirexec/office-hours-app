<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#0b1220;color:#e5e7eb}
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    .card{background:#111a2e;border:1px solid rgba(255,255,255,.10);border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.35)}
    .pad{padding:16px}
    button{background:#24314f;color:#e5e7eb;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:9px 12px;cursor:pointer}
    button:disabled{opacity:.55;cursor:not-allowed}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.10);text-align:left;font-size:14px}
    th{color:#cbd5e1;font-weight:600}
    .muted{color:#9ca3af}
    .right{display:flex;gap:10px;align-items:center}
    .toast{margin-top:10px;color:#fca5a5;white-space:pre-wrap}
    .ok{color:#86efac}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h2 style="margin:0">Admin</h2>
        <div class="muted" id="status">Loading…</div>
      </div>
      <div class="right">
        <button id="refreshBtn">Refresh</button>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="pad">
        <div id="msg" class="toast"></div>
        <table>
          <thead>
            <tr>
              <th>Slot</th>
              <th>Name</th>
              <th>Student No</th>
              <th>Email</th>
              <th>Booked At</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
const rows = document.getElementById('rows');
const statusEl = document.getElementById('status');
const msgEl = document.getElementById('msg');
const refreshBtn = document.getElementById('refreshBtn');
const logoutBtn = document.getElementById('logoutBtn');

function showMsg(text, ok=false){
  msgEl.textContent = text || '';
  msgEl.className = 'toast ' + (ok ? 'ok' : '');
}

async function ensureAuth(){
  const r = await fetch('/api/admin/me', { credentials:'include', cache:'no-store' });
  if(!r.ok){
    window.location.href = '/admin-login';
    return false;
  }
  return true;
}

async function load(){
  showMsg('');
  statusEl.textContent = 'Loading…';
  rows.innerHTML = '<tr><td colspan="6" class="muted">Loading…</td></tr>';

  const ok = await ensureAuth();
  if(!ok) return;

  try{
    const r = await fetch('/api/admin/bookings', { credentials:'include', cache:'no-store' });
    const text = await r.text();
    let data = [];
    try{ data = JSON.parse(text); } catch { throw new Error('Bad JSON'); }
    if(!r.ok){
      showMsg(data.error || ('HTTP ' + r.status));
      statusEl.textContent = 'Error';
      return;
    }

    data.sort((a,b)=> String(a.slot).localeCompare(String(b.slot)));
    statusEl.textContent = data.length + ' booking(s)';
    if(data.length === 0){
      rows.innerHTML = '<tr><td colspan="6" class="muted">No bookings yet.</td></tr>';
      return;
    }

    rows.innerHTML = data.map(r => `
      <tr>
        <td>${escapeHtml(r.slot)}</td>
        <td>${escapeHtml(r.name || '')}</td>
        <td>${escapeHtml(r.student_no || '')}</td>
        <td>${escapeHtml(r.email || '')}</td>
        <td class="muted">${escapeHtml(r.booked_at ? new Date(r.booked_at).toLocaleString() : '')}</td>
        <td><button data-slot="${escapeAttr(r.slot)}">Cancel</button></td>
      </tr>
    `).join('');

    rows.querySelectorAll('button[data-slot]').forEach(btn=>{
      btn.addEventListener('click', ()=> cancel(btn.getAttribute('data-slot'), btn));
    });
  }catch(err){
    showMsg('Load failed: ' + (err?.message || String(err)));
    statusEl.textContent = 'Error';
  }
}

async function cancel(slot, btn){
  if(!confirm('Cancel booking for:\n' + slot + '\n\nAre you sure?')) return;
  btn.disabled = true;
  try{
    const r = await fetch('/api/admin/cancel/' + encodeURIComponent(slot), {
      method:'DELETE',
      credentials:'include'
    });
    const text = await r.text();
    let data = {};
    try{ data = JSON.parse(text); } catch { data = { message:text }; }
    if(!r.ok){
      showMsg(data.error || data.message || ('HTTP ' + r.status));
      btn.disabled = false;
      return;
    }
    showMsg('Cancelled', true);
    load();
  }catch(err){
    showMsg('Cancel failed: ' + (err?.message || String(err)));
    btn.disabled = false;
  }
}

logoutBtn.addEventListener('click', async ()=>{
  try{ await fetch('/api/admin/logout', { method:'POST', credentials:'include' }); } catch {}
  window.location.href = '/admin-login';
});
refreshBtn.addEventListener('click', load);

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){
  return escapeHtml(s).replace(/`/g,'&#96;');
}

load();
</script>
</body>
</html>
